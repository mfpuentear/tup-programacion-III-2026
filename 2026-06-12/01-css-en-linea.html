<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React en HTML</title>

    <!-- React + ReactDOM (versión desarrollo) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel para transpilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      function Tarjeta({ nombre, rol }) {
        const tarjetaStyle = {
          border: "1px solid #ddd",
          borderRadius: 8,
          padding: 12,
          marginBottom: 10,
          backgroundColor: "#f7f7f7",
        };

        return (
          <div style={tarjetaStyle}>
            <h4 style={{ margin: 0 }}>{nombre}</h4>
            <small style={{ color: "#555" }}>{rol}</small>
          </div>
        );
      }

      function App() {
        return (
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <Tarjeta nombre="Tarjeta 1" rol="Jefe" />
            <Tarjeta nombre="Tarjeta 2" rol="Empleado" />
          </div>
        );
      }

      const container = document.getElementById("root");
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
