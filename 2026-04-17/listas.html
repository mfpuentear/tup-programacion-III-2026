<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplos de listas</title>
</head>
<body>
    <h1>Ejemplos de listas</h1>
    <a href="index.html">Volver</a>
    
    <h2>Lista desordenadas</h2>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <li>Item 4</li>
        <li>Items 5:
            <ul>
                <li>Subitem 5.1</li>
                <li>Subitem 5.2</li>
            </ul>
        </li>
    </ul>

    <h2>Lista ordenadas</h2>
    <!-- type="I" para numero romanos -->
    <ol type="I">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <li>Item 4</li>
        <li>Items 5:
            <ol type="a">
                <li>Subitem 5.1</li>
                <li>Subitem 5.2</li>
            </ol>
        </li>
    </ol>
</body>
</html>
