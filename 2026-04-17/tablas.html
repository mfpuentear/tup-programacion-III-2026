<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplos de tablas</title>
</head>
<body>
    <h1>Ejemplos de tablas</h1>
    <a href="index.html">Volver</a>

    <h2>Tabla simple</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Esteban</td>
            <td>Quito</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Juan</td>
            <td>Perez</td>
        </tr>
    </table>
    
    <h2>Tabla completa</h2>
    <table border="1">
        <thead>
        <tr>
            <th rowspan="2">ID</th>
            <th colspan="2">Nombre completo</th>
        </tr>
        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>10001</td>
            <td>Esteban Diego</td>
            <td>Quito del Rosedal</td>
        </tr>
        <tr>
            <td>12</td>
            <td>Juan Martin</td>
            <td>Perez de la Canales</td>
        </tr>
        <tr>
            <td>10003</td>
            <td colspan="2">Ramirez, Tito</td>
        </tr>
        </tbody>
        <caption>Titulo de tabla</caption>
    </table>
</body>
</html>
