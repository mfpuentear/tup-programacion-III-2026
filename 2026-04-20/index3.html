<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Ejemplo CSS</title>
    <style>
      h1.titulo {
        font-size: 26px;
      }
      ol li strong {
        color:red;
      }

      ul strong {
        color:green;
      }

      p strong {
        color:blue;
      }

      body {
        color:yellow
      }
    </style>
  </head>
  <body>
    <h1 class="titulo">Programación III</h1>
    <p class="titulo">Primer ejemplo con estilos.</p>
    <p>Segundo parrafo con elemento <strong>strong</strong></p>
    <ul>
      <p>un <strong>parrafo</strong></p>
      <li>Un <strong>item</strong></li>
    </ul>
    <ol>
      <li>otro <strong>item</strong></li>
    </ol>
  </body>
</html>
