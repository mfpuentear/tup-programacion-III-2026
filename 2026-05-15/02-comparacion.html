<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Comparaciones</title>
  </head>
  <body>
    <script>
      const valor1 = 5;
      const valor2 = "5";

      if (valor1 == valor2) {
        console.log("es igual");
      } else {
        console.log("no es igual");
      }

      if (valor1 === valor2) {
        console.log("es igual");
      } else {
        console.log("no es igual");
      }
    </script>
  </body>
</html>
