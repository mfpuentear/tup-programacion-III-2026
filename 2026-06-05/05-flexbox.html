<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Ejemplo flexbox</title>
    <link rel="stylesheet" href="estilos.css" />
  </head>
  <body>
    <main>
      <h1>Flexbox (alineacion eje secundario)</h1>
      <h2>align-item: flex-start</h2>
      <div class="contenedor alinear-principio">
        <div class="hijo">A</div>
        <div class="hijo2">B</div>
        <div class="hijo3">C</div>
      </div>
      <h2>align-items: flex-end</h2>
      <div class="contenedor alinear-final">
        <div class="hijo">A</div>
        <div class="hijo2">B</div>
        <div class="hijo3">C</div>
      </div>
      <h2>align-items: center</h2>
      <div class="contenedor alinear-centro">
        <div class="hijo">A</div>
        <div class="hijo2">B</div>
        <div class="hijo3">C</div>
      </div>
    </main>
  </body>
</html>
