<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Ejemplo flexbox</title>
    <link rel="stylesheet" href="estilos.css" />
  </head>
  <body>
    <main>
      <h1>Flexbox (alineacion eje principal)</h1>
      <h2>justify-content: flex-start</h2>
      <div class="contenedor justificar-principio">
        <div class="hijo">A</div>
        <div class="hijo">B</div>
        <div class="hijo">C</div>
      </div>
      <h2>justify-content: flex-end</h2>
      <div class="contenedor justificar-final">
        <div class="hijo">A</div>
        <div class="hijo">B</div>
        <div class="hijo">C</div>
      </div>
      <h2>justify-content: center</h2>
      <div class="contenedor justificar-centro">
        <div class="hijo">A</div>
        <div class="hijo">B</div>
        <div class="hijo">C</div>
      </div>
      <h2>justify-content: space-between</h2>
      <div class="contenedor justificar-entre">
        <div class="hijo">A</div>
        <div class="hijo">B</div>
        <div class="hijo">C</div>
      </div>
      <h2>justify-content: space-around</h2>
      <div class="contenedor justificar-alrededor">
        <div class="hijo">A</div>
        <div class="hijo">B</div>
        <div class="hijo">C</div>
      </div>
      <h2>justify-content: space-evently</h2>
      <div class="contenedor justificar-igualado">
        <div class="hijo">A</div>
        <div class="hijo">B</div>
        <div class="hijo">C</div>
      </div>
    </main>
  </body>
</html>
